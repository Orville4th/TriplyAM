name: Build Triply

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install PyQt6 PyOpenGL PyOpenGL_accelerate numpy numpy-stl
          pip install scikit-image scipy meshlib manifold3d cadquery
          pip install pyvista pymeshfix pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller triply.spec --clean

      - name: Create installer with Inno Setup
        run: |
          choco install innosetup -y
          iscc installer.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: Triply-Setup-${{ github.ref_name }}
          path: Triply-Setup.exe
