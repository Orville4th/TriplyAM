name: Build Triply

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install PyQt6 PyOpenGL PyOpenGL_accelerate numpy numpy-stl
          pip install scikit-image scipy meshlib manifold3d cadquery
          pip install pyvista pymeshfix pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller triply.spec --clean

      - name: Install Inno Setup and create installer
        run: |
          choco install innosetup -y
          iscc installer.iss

      - name: Create GitHub Release and upload installer
        uses: softprops/action-gh-release@v2
        with:
          name: Triply ${{ github.ref_name }}
          body: |
            ## Triply AM Tools ${{ github.ref_name }}
            
            ### Windows Installation
            1. Download `Triply-Setup.exe` below
            2. Run the installer
            3. Launch Triply from your Desktop or Start Menu
            
            ### Linux
            Download the AppImage from the Linux release assets.
            
          files: Triply-Setup.exe
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libglib2.0-0 libxcb-xinerama0

      - name: Install Python dependencies
        run: |
          pip install PyQt6 PyOpenGL PyOpenGL_accelerate numpy numpy-stl
          pip install scikit-image scipy meshlib manifold3d cadquery
          pip install pyvista pymeshfix

      - name: Install appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          sudo mv appimagetool-x86_64.AppImage /usr/local/bin/appimagetool

      - name: Build AppImage
        run: |
          chmod +x build_appimage.sh
          ./build_appimage.sh ${{ github.ref_name }}

      - name: Upload AppImage to Release
        uses: softprops/action-gh-release@v2
        with:
          name: Triply ${{ github.ref_name }}
          files: "*.AppImage"
          prerelease: ${{ contains(github.ref_name, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
